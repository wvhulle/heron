name = "heron"
version = "0.1.0"
defaultTargets = ["Heron"]

[[lean_lib]]
name = "Heron"
globs = ["Heron.*"]

[[lean_lib]]
name = "Demo"
globs = ["Demo"]

[[lean_exe]]
name = "dump-ast"
root = "DumpAst"

[[lean_exe]]
name = "heron-lint"
root = "HeronLint"
# Loading the target's Lake workspace (to enumerate libraries) evaluates its lakefile
# via the interpreter, which needs the Lean/Lake native symbols available.
supportInterpreter = true
