name = "heron"
version = "0.1.0"
defaultTargets = ["Heron"]

[[lean_lib]]
name = "Heron"
globs = ["Heron.*"]
# Heron doubles as a `lean --plugin`: building the lib also emits the plugin shared library
# (`libheron_Heron.so`) out of the box, so the `heron` reporter can load it without the user
# locating or pre-building anything.
defaultFacets = ["shared"]

[[lean_lib]]
name = "Demo"
globs = ["Demo"]

# Shared engines/rendering for the two reporter binaries (per-file, shared-env, build-sink).
# Named `Reporter` (not `Cli`) so it doesn't collide with the `Cli` package that consumers pull in
# transitively (e.g. via doc-gen4) — a `Cli.*` lib here would shadow that dependency.
[[lean_lib]]
name = "Reporter"
globs = ["Reporter.*"]

# The executables' roots live under `Bin/` — intentionally outside the `Heron.*` glob so the IO
# `main`s (and Lake, pulled in by `Reporter.BuildSink`) never get linked into the plugin `.so`.
[[lean_exe]]
name = "dump-ast"
root = "Bin.DumpAst"

# Build-integrated reporter: drives `lake build` with Heron as a `lean --plugin` + reads the sink.
[[lean_exe]]
name = "heron"
root = "Bin.Build"
# Loading the target's Lake workspace (to enumerate libraries) evaluates its lakefile via the
# interpreter, which needs the Lean/Lake native symbols available.
supportInterpreter = true

# Self-contained reporter: imports Heron and elaborates the target files itself.
[[lean_exe]]
name = "heron-scan"
root = "Bin.Scan"
# Detection runs imported modules' initializers / rule meta-code via the interpreter.
supportInterpreter = true
