name = "heron"
version = "0.1.0"
defaultTargets = ["Heron"]

[[lean_lib]]
name = "Heron"
globs = ["Heron.*"]

[[lean_lib]]
name = "Demo"
globs = ["Demo"]

# Shared engines/rendering for the two reporter binaries (per-file, shared-env, build-sink).
[[lean_lib]]
name = "Reporter"
globs = ["Reporter.*"]

[[lean_exe]]
name = "dump-ast"
root = "DumpAst"

# Build-integrated reporter: drives `lake build` with Heron as a `lean --plugin` + reads the sink.
[[lean_exe]]
name = "heron"
root = "HeronBuild"
# Loading the target's Lake workspace (to enumerate libraries) evaluates its lakefile via the
# interpreter, which needs the Lean/Lake native symbols available.
supportInterpreter = true

# Self-contained reporter: imports Heron and elaborates the target files itself.
[[lean_exe]]
name = "heron-scan"
root = "HeronScan"
# Detection runs imported modules' initializers / rule meta-code via the interpreter.
supportInterpreter = true
