name = "heron"
version = "0.1.0"
defaultTargets = ["Heron"]

[[lean_lib]]
name = "Heron"
globs = ["Heron.*"]

[[lean_lib]]
name = "Demo"
globs = ["Demo"]

[[lean_exe]]
name = "dump-ast"
root = "DumpAst"

[[lean_exe]]
name = "heron-lint"
root = "HeronLint"
# Required: the binary imports and runs the initializers of arbitrary target
# modules (and Heron's rule registry) through the interpreter at runtime.
supportInterpreter = true
